# ──────────────────────────────────────────────────────────────
#  Nginx Load Balancer — GraphQL Demo
#  Algorithm : least_conn  (switch to round-robin by removing it)
# ──────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream pool ──────────────────────────────────────────
    upstream graphql_backends {
        least_conn;              # route to server with fewest active connections
        # Round-robin (default): just remove the line above

        server server-1:8000;
        server server-2:8000;
        server server-3:8000;
        server server-4:8000;

        keepalive 32;            # reuse TCP connections to backends
    }

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent "$upstream_addr" '
                    'rt=$request_time ut=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance tweaks ─────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;

    # ── Main virtual server ────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # GraphQL endpoint — proxied through the load balancer
        location /graphql {
            proxy_pass         http://graphql_backends;
            proxy_http_version 1.1;

            # Required for keepalive to work
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Timeouts
            proxy_connect_timeout  5s;
            proxy_send_timeout     30s;
            proxy_read_timeout     60s;

            # Pass large GraphQL bodies
            client_max_body_size   4m;
        }

        # Health check passthrough
        location /health {
            proxy_pass http://graphql_backends;
        }

        # Nginx internal metrics (scraped by prometheus/nginx-exporter if used)
        location /nginx_status {
            stub_status;
            allow all;
        }

        # Simple alive check for the load balancer itself
        location /ping {
            return 200 "pong\n";
            add_header Content-Type text/plain;
        }
    }
}
