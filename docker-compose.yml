version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
#  Nginx Load-Balancer Demo
#
#  Services:
#    server-1..4  → FastAPI + GraphQL + Prometheus metrics
#    nginx        → Least-connection load balancer (port 80)
#    client       → Async traffic generator
#    prometheus   → Metrics collection (port 9090)
#    grafana      → Dashboards (port 3000, admin/admin)
# ──────────────────────────────────────────────────────────────────────────────

x-server: &server-defaults
    build: ./server
    restart: unless-stopped
    networks:
        - backend
    healthcheck:
        test:
            [
                "CMD",
                "python",
                "-c",
                "import urllib.request;
                  urllib.request.urlopen('http://localhost:8000/health')",
            ]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 10s

services:

    # ── GraphQL Application Servers ─────────────────────────────────────────────
    server-1:
        <<: *server-defaults
        container_name: server-1
        environment:
            - SERVER_ID=server-1

    server-2:
        <<: *server-defaults
        container_name: server-2
        environment:
            - SERVER_ID=server-2

    server-3:
        <<: *server-defaults
        container_name: server-3
        environment:
            - SERVER_ID=server-3

    server-4:
        <<: *server-defaults
        container_name: server-4
        environment:
            - SERVER_ID=server-4

    # ── Nginx Load Balancer ─────────────────────────────────────────────────────
    nginx:
        image: nginx:1.27-alpine
        container_name: nginx-lb
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            server-1:
                condition: service_healthy
            server-2:
                condition: service_healthy
            server-3:
                condition: service_healthy
            server-4:
                condition: service_healthy
        networks:
            - backend
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://127.0.0.1/ping"]
            interval: 10s
            timeout: 3s
            retries: 3
            start_period: 20s

    # ── Traffic Generator ───────────────────────────────────────────────────────
    client:
        build: ./client
        container_name: graphql-client
        restart: unless-stopped
        environment:
            - NGINX_URL=http://nginx/graphql
            - CONCURRENCY=4 # parallel async workers
            - MIN_DELAY=0.3 # min seconds between each worker's requests
            - MAX_DELAY=1.5
        depends_on:
            nginx:
                condition: service_healthy
        networks:
            - backend

    # ── Prometheus ──────────────────────────────────────────────────────────────
    prometheus:
        image: prom/prometheus:v2.52.0
        container_name: prometheus
        restart: unless-stopped
        ports:
            - "9090:9090"
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
            - "--web.enable-lifecycle"
        networks:
            - backend

    # ── Grafana ─────────────────────────────────────────────────────────────────
    grafana:
        image: grafana/grafana:11.0.0
        container_name: grafana
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
            - GF_USERS_ALLOW_SIGN_UP=false
            - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/nginx-lb-demo.json
        volumes:
            - ./grafana/provisioning:/etc/grafana/provisioning:ro
            - grafana_data:/var/lib/grafana
        depends_on:
            - prometheus
        networks:
            - backend

networks:
    backend:
        driver: bridge

volumes:
    prometheus_data:
    grafana_data:
