kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
metadata:
    name: graphql-lb
nodes:
    - role: control-plane
      extraPortMappings:
          - containerPort: 30080
            hostPort: 8080
            listenAddress: "127.0.0.1"
            protocol: TCP
          - containerPort: 30090
            hostPort: 9090
            listenAddress: "127.0.0.1"
            protocol: TCP
          - containerPort: 30300
            hostPort: 3000
            listenAddress: "127.0.0.1"
            protocol: TCP
